---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app weave-gitops
spec:
  interval: 30m
  chart:
    spec:
      chart: *app
      version: 4.0.36
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    adminUser:
      create: true
      createSecret: false
      username: admin
    networkPolicy:
      create: false
    metrics:
      enabled: true
    rbac:
      create: true
      viewSecretsResourceNames:
        - cluster-user-auth
    podAnnotations:
      secret.reloader.stakater.com/reload: cluster-user-auth
    resources:
      requests:
        cpu: 30m
        memory: 70Mi
      limits:
        memory: 210Mi
