---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app weave-gitops
spec:
  interval: 30m
  chart:
    spec:
      chart: *app
      version: 4.0.36
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    additionalArgs:
      - --auth-methods=oidc
      - --oidc-secret-name=weave-gitops-oidc-auth
    adminUser:
      create: true
      createSecret: false
      username: admin
    route:
      app:
        hostnames: ["gitops.devilfruitlabs.com"]
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
                namespace: flux-system
    networkPolicy:
      create: false
    metrics:
      enabled: true
    rbac:
      create: true
      viewSecretsResourceNames:
        - weave-gitops
    podAnnotations:
      secret.reloader.stakater.com/reload: weave-gitops
    resources:
      requests:
        cpu: 30m
        memory: 70Mi
      limits:
        memory: 210Mi
