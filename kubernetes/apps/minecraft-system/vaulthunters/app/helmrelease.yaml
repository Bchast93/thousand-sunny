---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaulthunters
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: volsync
      namespace: volsync-system
  values:
    controllers:
      vaulthunters:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/bchast93/vaulthunters
              tag: sha256-85021786c5264a155c31cce656a3e52738ed7352c7fe4188726069095c7b96d6
            env:
              EULA: true
              OPS: "[democius,madog_porter,taylorlovely56]"
              JVM_OPTS: "-XX:+UseG1GC -Xmx16G -Xms6G -Dsun.rmi.dgc.server.gcInterval=2147483646 -XX:+UnlockExperimentalVMOptions -XX:G1NewSizePercent=20 -XX:G1ReservePercent=20 -XX:MaxGCPauseMillis=50 -XX:G1HeapRegionSize=32M -XX:ParallelGCThreads=20"
              CBLOCK: true
              MOTD: "VAULT TILL YOU DROP"
              DIFFICULTY: normal
              GAMEMODE: survival
    defaultPodOptions:
      hostname: vaulthunters
      securityContext:
        # runAsNonRoot: true
        # runAsUser: 1000
        # runAsGroup: 1000
        # fsGroup: 1000
        # fsGroupChangePolicy: OnRootMismatch
        # supplementalGroups: [10000]
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: vaulthunters
        ports:
          http:
            port: 25565
    ingress:
      app:
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "external.${SECRET_DOMAIN}"
        hosts:
          - host: &host "vaulthunters.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      data:
        existingClaim: vaulthunters
        # advancedMounts:
        #   foundryvtt:
        #     data:
        #       - path: /data
        #     filebrowser:
        #       - path: /db
        #         subPath: filebrowser
        #       - path: /data
